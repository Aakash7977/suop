# SUOP ERP v1.0 — Kubernetes Secrets (placeholder — use sealed-secrets or external-secrets in production)
apiVersion: v1
kind: Secret
metadata:
  name: suop-backend-secrets
  namespace: suop
  labels:
    app.kubernetes.io/name: suop-backend
type: Opaque
stringData:
  DATABASE_URL: "postgresql://suop:CHANGE_ME@postgres:5432/suop_prod?schema=public&pool_max=20"
  REDIS_URL: "redis://:CHANGE_ME@redis:6379"
  JWT_SECRET: "CHANGE_ME_TO_A_64_CHAR_RANDOM_STRING"
  FIELD_ENCRYPTION_KEY: "CHANGE_ME_TO_A_48_CHAR_BASE64_KEY"
  S3_ENDPOINT: "https://s3.ap-south-1.amazonaws.com"
  S3_BUCKET: "suop-uploads-prod"
  S3_ACCESS_KEY: "CHANGE_ME"
  S3_SECRET_KEY: "CHANGE_ME"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_USER: "no-reply@sudhamrit.com"
  SMTP_PASS: "CHANGE_ME"
  SENTRY_DSN: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: suop
type: Opaque
stringData:
  POSTGRES_USER: "suop"
  POSTGRES_PASSWORD: "CHANGE_ME_TO_STRONG_PASSWORD"
  POSTGRES_DB: "suop_prod"
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secrets
  namespace: suop
type: Opaque
stringData:
  REDIS_PASSWORD: "CHANGE_ME_TO_STRONG_PASSWORD"
