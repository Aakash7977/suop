# SUOP ERP v1.0 — ConfigMap (non-secret configuration)
apiVersion: v1
kind: ConfigMap
metadata:
  name: suop-backend-config
  namespace: suop
  labels:
    app.kubernetes.io/name: suop-backend
data:
  NODE_ENV: "production"
  PORT: "3030"
  DATABASE_POOL_SIZE: "20"
  DATABASE_STATEMENT_TIMEOUT_MS: "30000"
  DATABASE_LOG_QUERIES: "false"
  JWT_ISSUER: "suop-erp"
  JWT_AUDIENCE: "suop-frontend"
  JWT_ACCESS_TTL_MIN: "15"
  JWT_REFRESH_TTL_DAYS: "30"
  S3_REGION: "ap-south-1"
  S3_FORCE_PATH_STYLE: "false"
  SMTP_PORT: "587"
  SMTP_FROM: "no-reply@sudhamrit.com"
  LOG_LEVEL: "info"
  CORS_ALLOWED_ORIGINS: "https://app.sudhamrit.com,https://admin.sudhamrit.com"
  MAX_BODY_BYTES: "1048576"
  MAX_UPLOAD_BYTES: "52428800"
  REQUEST_TIMEOUT_MS: "30000"
  CACHE_TTL_PERMISSIONS: "300"
  CACHE_TTL_CONFIG: "60"
  CACHE_TTL_MASTER_DATA: "600"
  CACHE_TTL_DASHBOARD: "30"
  CACHE_TTL_ANALYTICS: "300"
  JOB_WORKER_ENABLED: "true"
  JOB_WORKER_POLL_MS: "1000"
  JOB_MAX_CONCURRENT: "10"
  OTEL_SERVICE_NAME: "suop-backend"
  OTEL_SERVICE_VERSION: "1.0.0-rc1"
