# SUOP ERP v1.0 — Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: suop-backend-hpa
  namespace: suop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: suop-backend
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
---
# Pod Disruption Budget (ensure min 2 pods always available)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: suop-backend-pdb
  namespace: suop
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: suop-backend
