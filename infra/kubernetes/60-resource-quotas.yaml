# SUOP ERP v1.0 — Resource Quotas & Limit Ranges
apiVersion: v1
kind: ResourceQuota
metadata:
  name: suop-resource-quota
  namespace: suop
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    persistentvolumeclaims: "10"
    services: "10"
    services.loadbalancers: "1"
    configmaps: "20"
    secrets: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: suop-limit-range
  namespace: suop
spec:
  limits:
    - default:
        cpu: 1000m
        memory: 1Gi
      defaultRequest:
        cpu: 100m
        memory: 256Mi
      type: Container
    - max:
        storage: 200Gi
      min:
        storage: 1Gi
      type: PersistentVolumeClaim
