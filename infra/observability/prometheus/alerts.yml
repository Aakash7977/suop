# SUOP ERP v1.0 — Prometheus Alert Rules
groups:
  - name: suop-backend
    rules:
      # ─── Availability ─────────────────────────────────────────────────────
      - alert: SuopBackendDown
        expr: up{job="suop-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "SUOP Backend is down"
          description: "Backend {{ $labels.instance }} has been down for more than 1 minute."

      - alert: SuopBackendHighErrorRate
        expr: |
          rate(http_requests_total{job="suop-backend",status=~"5.."}[5m])
          / rate(http_requests_total{job="suop-backend"}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate (>5%) on SUOP Backend"
          description: "Error rate is {{ $value | humanizePercentage }} for the last 5 minutes."

      # ─── Latency ──────────────────────────────────────────────────────────
      - alert: SuopBackendHighLatency
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket{job="suop-backend"}[5m])
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency (>1s) on SUOP Backend"
          description: "p95 latency is {{ $value }}s."

      # ─── Resource Usage ────────────────────────────────────────────────────
      - alert: SuopBackendHighMemory
        expr: |
          process_resident_memory_bytes{job="suop-backend"}
          / container_spec_memory_limit_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage (>85%) on SUOP Backend"

      - alert: SuopBackendHighCPU
        expr: |
          rate(process_cpu_seconds_total{job="suop-backend"}[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage (>80%) on SUOP Backend"

  - name: database
    rules:
      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"

      - alert: PostgresHighConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connections > 80"

      - alert: PostgresSlowQueries
        expr: pg_stat_activity_max_tx_duration > 300
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL has queries running > 5 minutes"

  - name: redis
    rules:
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"

      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage > 90%"
