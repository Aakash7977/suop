# SUOP ERP v1.0 — Prometheus Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: suop-prod
    environment: production

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: 'suop-backend'
    metrics_path: '/api/v1/_internal/metrics'
    scheme: http
    static_configs:
      - targets: ['suop-backend:3030']
        labels:
          service: backend

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
