apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "suop.fullname" . }}-backend
  labels:
    {{- include "suop.labels" . | nindent 4 }}
spec:
  {{- if not .Values.backend.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "suop.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "suop.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.backend.env.PORT | quote }}
        prometheus.io/path: {{ .Values.observability.prometheus.path | quote }}
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.registry }}/{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.env.PORT | int }}
          envFrom:
            - configMapRef:
                name: {{ include "suop.fullname" . }}-config
            - secretRef:
                name: {{ include "suop.fullname" . }}-secrets
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.backend.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.backend.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.backend.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.backend.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.readiness.periodSeconds }}
          startupProbe:
            httpGet:
              path: {{ .Values.backend.probes.startup.path }}
              port: http
            failureThreshold: {{ .Values.backend.probes.startup.failureThreshold }}
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "suop.fullname" . }}-backend
  labels:
    {{- include "suop.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "suop.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.backend.env.PORT | int }}
      targetPort: http
