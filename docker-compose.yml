# ════════════════════════════════════════════════════════════════════════════
# SUOP ERP v1.0 — Docker Compose (Development)
# ════════════════════════════════════════════════════════════════════════════
# Local development stack: backend + PostgreSQL + Redis + S3 (MinIO)
#
# Usage:
#   docker-compose up -d                    # Start all services
#   docker-compose logs -f backend          # Tail backend logs
#   docker-compose exec backend bun test    # Run tests in container
#   docker-compose down                     # Stop all services

services:
  # ─── PostgreSQL Database ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: suop-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: suop
      POSTGRES_PASSWORD: suop_dev_password
      POSTGRES_DB: suop_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/backend/prisma/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suop -d suop_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - suop-network

  # ─── Redis Cache ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: suop-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - suop-network

  # ─── MinIO (S3-compatible object storage) ─────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: suop-minio-dev
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - suop-network

  # ─── Backend Service (Bun + Hono) ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.dev
    container_name: suop-backend-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3030
      DATABASE_URL: postgresql://suop:suop_dev_password@postgres:5432/suop_dev?schema=public
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: suop-uploads
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_REGION: ap-south-1
      S3_FORCE_PATH_STYLE: "true"
      JWT_SECRET: dev-only-jwt-secret-min-32-chars-long-please-rotate
      JWT_ISSUER: suop-erp
      JWT_AUDIENCE: suop-frontend
      JWT_ACCESS_TTL_MIN: 15
      JWT_REFRESH_TTL_DAYS: 30
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: no-reply@sudhamrit.com
      LOG_LEVEL: debug
    ports:
      - "3030:3030"
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
      - backend_uploads:/app/uploads
      - backend_db:/app/db
    networks:
      - suop-network

  # ─── MailHog (SMTP capture for dev) ───────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: suop-mailhog-dev
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - suop-network

networks:
  suop-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backend_uploads:
  backend_db:
