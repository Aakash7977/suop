# SUOP — Local Development Infrastructure
# Sprint 1: Platform Foundation
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose down           # Stop all services
#   docker compose ps             # Check status
#   docker compose logs -f        # Follow logs
#
# Services:
#   PostgreSQL  : localhost:5432  (suop / suop_password)
#   Redis       : localhost:6379
#   RabbitMQ    : localhost:5672  (Management: localhost:15672)
#   MinIO       : localhost:9000  (Console: localhost:9001)
#   OpenSearch  : localhost:9200
#   Prometheus  : localhost:9090
#   Grafana     : localhost:3001  (admin / admin)
#   Loki        : localhost:3100
#   Tempo       : localhost:3200

version: "3.9"

services:
  # ─── Database ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: suop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: suop
      POSTGRES_PASSWORD: suop_password
      POSTGRES_DB: suop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suop -d suop"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - suop-network

  # ─── Cache ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: suop-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - suop-network

  # ─── Message Broker ──────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: suop-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: suop
      RABBITMQ_DEFAULT_PASS: suop_password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - suop-network

  # ─── Object Storage (S3 Compatible) ──────────────────
  minio:
    image: minio/minio:latest
    container_name: suop-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: suop
      MINIO_ROOT_PASSWORD: suop_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - suop-network

  # ─── Search Engine ───────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: suop-opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "DISABLE_SECURITY_PLUGIN=true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - suop-network

  # ─── Monitoring: Prometheus ──────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: suop-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
    networks:
      - suop-network

  # ─── Monitoring: Grafana ─────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: suop-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - suop-network

  # ─── Monitoring: Loki (Logs) ─────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: suop-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks:
      - suop-network

  # ─── Monitoring: Tempo (Tracing) ─────────────────────
  tempo:
    image: grafana/tempo:latest
    container_name: suop-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infrastructure/docker/tempo/tempo.yml:/etc/tempo.yaml
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"      # Tempo UI
      - "4317:4317"      # OTLP gRPC
      - "4318:4318"      # OTLP HTTP
    networks:
      - suop-network

# ─── Volumes ────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  opensearch_data:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:

# ─── Networks ───────────────────────────────────────────
networks:
  suop-network:
    driver: bridge
